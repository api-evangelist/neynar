  next: PageCursor
}

type ChannelSearchResult {
  channels: [Channel!]!
  next: PageCursor
}

type ChannelMemberListResult {
  members: [ChannelMember!]!
  next: PageCursor
}

type ReactionListResult {
  reactions: [ReactionWithCastInfo!]!
  next: PageCursor
}

type FollowerListResult {
  users: [Follower!]!
  next: PageCursor
}

type NotificationListResult {
  notifications: [Notification!]!
  next: PageCursor
}

type FrameListResult {
  frames: [FrameV2WithFullAuthor!]!
  next: PageCursor
}

type FrameNotificationTokenResult {
  token: String
  app_fid: Int
}

type FnameAvailabilityResult {
  available: Boolean!
  valid: Boolean!
  fname: String!
}

type RegisterUserResult {
  success: Boolean!
  idem: String
}

type OperationResult {
  success: Boolean!
}

type SendNotificationsResult {
  notification_deliveries: [NotificationDelivery!]
}

type NotificationDelivery {
  fid: Int!
  status: String!
}

type TransactionSendFungiblesResult {
  object: String
  recipients: [TransactionSendFungiblesRecipient!]
}

type TransactionSendFungiblesRecipient {
  address: String
  fid: Int
  amount: String
  tx_hash: String
}
