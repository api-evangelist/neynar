name: Neynar
description: Neynar is the complete Farcaster developer platform providing infrastructure REST APIs for querying casts, channels, user profiles, feeds, reactions, and building applications on the Farcaster decentralized social protocol. As of January 2026, Neynar acquired Farcaster from Merkle Manufactures, taking operational responsibility for the protocol, client, and related infrastructure.
