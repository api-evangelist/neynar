                        subtype:
                          description: Message subtype
                          type: string
                        type:
                          description: Message type
                          type: string
                      required:
                      - id
                      - created_at
                      - conversation_id
                      - message
                      - origin
                      type: object
                    type: array
                  next:
                    $ref: '#/components/schemas/NextCursor'
                required:
                - messages
                - next
                type: object
          description: Success
        '400':
          content:
            application/json:
              schema:
                properties:
                  error:
                    type: string
                required:
                - error
                type: object
          description: Bad Request
        '403':
          content:
            application/json:
              schema:
                properties:
                  error:
                    type: string
                required:
                - error
                type: object
          description: Forbidden
        '404':
          content:
            application/json:
