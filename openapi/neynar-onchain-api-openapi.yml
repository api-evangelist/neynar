  /v2/signature/x402/:
    post:
      description: Create a signature for a given x402 resource using the specified wallet.
      externalDocs:
        url: https://docs.neynar.com/reference/create-x402-signature
      operationId: create-x402-signature
      parameters:
      - $ref: '#/components/parameters/WalletIdHeader'
      - in: header
        name: x-api-key
        required: true
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              properties:
                payment_requirements:
                  properties:
                    accepts:
                      items:
                        properties:
                          asset:
                            description: Ethereum address
                            example: '0x5a927ac639636e534b678e81768ca19e2c6280b7'
                            pattern: ^0x[a-fA-F0-9]{40}$
                            title: EthAddress
                            type: string
                          description:
                            type: string
                          extra:
                            additionalProperties: {}
                            nullable: true
                            type: object
                          maxAmountRequired:
                            type: string
                          maxTimeoutSeconds:
                            type: number
                          mimeType:
                            type: string
                          network:
                            enum:
                            - base
                            - base-sepolia
                            type: string
                          outputSchema:
                            additionalProperties: {}
                            nullable: true
                            type: object
                          payTo:
                            description: Ethereum address
                            example: '0x5a927ac639636e534b678e81768ca19e2c6280b7'
                            pattern: ^0x[a-fA-F0-9]{40}$
                            title: EthAddress
                            type: string
                          resource:
                            format: uri
                            type: string
                          scheme:
                            enum:
                            - exact
                            type: string
                        required:
                        - scheme
                        - network
                        - maxAmountRequired
                        - asset
                        - payTo
                        - resource
                        - description
                        - maxTimeoutSeconds
                        type: object
                      minItems: 1
                      type: array
                    x402Version:
                      anyOf:
                      - enum:
                        - 1
                        type: number
                      - enum:
                        - 2
                        type: number
                  required:
                  - x402Version
                  - accepts
                  type: object
              required:
              - payment_requirements
              type: object
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                properties:
                  network:
                    enum:
                    - base
                    - base-sepolia
                    type: string
                  payload:
                    properties:
                      authorization:
                        properties:
                          from:
                            $ref: '#/components/schemas/EthAddress'
                          nonce:
                            pattern: ^0x[a-fA-F0-9]{64}$
                            type: string
                          to:
                            $ref: '#/components/schemas/EthAddress'
                          validAfter:
                            type: string
                          validBefore:
                            type: string
                          value:
                            type: string
                        required:
                        - from
                        - to
                        - value
                        - validAfter
                        - validBefore
                        - nonce
                        type: object
                      signature:
                        pattern: ^0x[a-fA-F0-9]{130}$
                        type: string
                    required:
                    - signature
                    - authorization
                    type: object
                  scheme:
                    enum:
                    - exact
                    type: string
                  x402Version:
                    anyOf:
                    - enum:
                      - 1
                      type: number
                    - enum:
                      - 2
                      type: number
                required:
                - x402Version
                - scheme
                - network
                - payload
                type: object
          description: Success
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorRes'
          description: Bad Request
        '401':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorRes'
          description: Unauthorized
        '403':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorRes'
          description: Forbidden
        '500':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorRes'
          description: Server Error
      summary: Create x402 signature
      tags:
      - Onchain
  /v2/signature/x402/siwx:
    post:
      description: Create a Sign-In-With-X payload for a wallet-backed x402 resource.
      externalDocs:
        url: https://docs.neynar.com/reference/create-x402-siwx
      operationId: create-x402-siwx
      parameters:
      - $ref: '#/components/parameters/WalletIdHeader'
      - in: header
        name: x-api-key
        required: true
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              properties:
                chainId:
                  anyOf:
                  - enum:
                    - 8453
                    type: number
                  - enum:
                    - 84532
                    type: number
                  default: 8453
                resource:
                  format: uri
                  type: string
              required:
              - resource
              type: object
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                properties:
                  address:
                    $ref: '#/components/schemas/EthAddress'
                  chainId:
                    anyOf:
                    - enum:
                      - 8453
                      type: number
                    - enum:
                      - 84532
                      type: number
                  message:
                    type: string
                  signature:
                    pattern: ^0x[a-fA-F0-9]{130}$
                    type: string
                  timestamp:
                    type: number
                required:
                - address
                - message
                - signature
                - timestamp
                - chainId
                type: object
          description: Success
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorRes'
          description: Bad Request
        '401':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorRes'
          description: Unauthorized
        '403':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorRes'
          description: Forbidden
        '500':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorRes'
          description: Server Error
      summary: Create x402 Sign-In-With-X payload
      tags:
      - Onchain
components:
  schemas:
    TokenBalance:
      description: The token balance associated with a wallet address and a network
      properties:
        balance:
          properties:
            in_token:
              description: The balance in the token
              type: string
            in_usdc:
              description: The balance in USDC
              type: string
          required:
          - in_token
          - in_usdc
          type: object
        object:
          enum:
          - token_balance
          type: string
        token:
          properties:
