  /v2/onchain/token/balances:
    get:
      description: Fetch all token balances for a wallet address across multiple networks. Results are paginated.
      externalDocs:
        url: https://docs.neynar.com/reference/get-wallet-balances
      operationId: get-wallet-balances
      parameters:
      - description: Comma-separated list of networks to query. Each value must be a valid network (ethereum, optimism, base, arbitrum).
        in: query
        name: networks
        required: true
        schema:
          example: base
          type: string
          x-comma-separated: true
      - description: Wallet address
        in: query
        name: address
        required: true
        schema:
          example: '0x5a927ac639636e534b678e81768ca19e2c6280b7'
          pattern: ^0x[a-fA-F0-9]{40}$
          type: string
      - description: Number of results to return (max 100)
        in: query
        name: limit
        schema:
          default: 50
          example: 50
          format: int32
          maximum: 100
          minimum: 1
          type: integer
        x-is-limit-param: true
      - description: Pagination cursor.
        in: query
        name: cursor
        schema:
          type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                properties:
                  balances:
                    items:
                      properties:
                        address:
                          description: Token contract address
                          example: '0x5a927ac639636e534b678e81768ca19e2c6280b7'
                          pattern: ^0x[a-fA-F0-9]{40}$
                          type: string
                        balance:
                          description: Raw token balance
                          example: '1000000000'
                          type: string
                        balance_usd:
                          description: Balance value in USD
                          example: '1000.50'
                          nullable: true
                          type: string
                        decimals:
                          description: Token decimals
                          example: 6
                          type: integer
                        image_url:
                          description: Token logo URL
                          example: https://example.com/token.png
                          nullable: true
                          type: string
                        name:
                          description: Token name
                          example: USD Coin
                          type: string
                        network:
                          $ref: '#/components/schemas/Network'
                        price_usd:
                          description: Token price in USD
                          example: '1.00'
                          nullable: true
                          type: string
                        symbol:
                          description: Token symbol
                          example: USDC
                          type: string
                      required:
                      - network
                      - address
                      - name
                      - symbol
                      - decimals
                      - balance
                      - balance_usd
                      - price_usd
                      - image_url
                      type: object
                    type: array
                  next:
                    properties:
                      cursor:
                        description: Pagination cursor for next page, null if no more results
                        nullable: true
                        type: string
                    required:
                    - cursor
                    type: object
                required:
                - balances
                - next
                type: object
          description: Success
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorRes'
          description: Bad Request
        '500':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorRes'
          description: Server Error
